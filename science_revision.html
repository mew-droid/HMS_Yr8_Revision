['Red, green, and blue light combine to make white light',true,'These are the three primary colours of LIGHT. Mixing them all together produces white light. This is different from mixing paint (subtractive mixing).'],
['The cornea focuses light more than the lens in the human eye',true,'Most refraction in the eye occurs at the cornea. The lens provides fine adjustment. Many people assume the lens does all the work.'],
['A converging lens spreads light rays apart',false,'A CONVERGING lens brings rays together (converges them). A DIVERGING lens spreads them apart. Converging = thicker in the middle.']
],
questions:[
['State the law of reflection. What is meant by the "normal" in a reflection diagram?','The law of reflection states: the angle of incidence equals the angle of reflection.\n\nThe NORMAL is an imaginary line drawn perpendicular (at 90°) to the reflecting surface at the exact point where the light ray hits. Both the angle of incidence and the angle of reflection are measured from this normal line — NOT from the surface itself.'],
['Explain what happens when a ray of light passes from air into glass. Why does it change direction?','When light passes from air into glass:\n1. It slows down — glass is a denser (optically more dense) medium than air\n2. The slowing causes the light to CHANGE DIRECTION\n3. It bends TOWARDS the normal (the angle of refraction is smaller than the angle of incidence)\n\nWhen light passes from glass back into air:\n• It speeds up\n• It bends AWAY from the normal\n\nMemory aid: "towards the normal when it slows (denser medium); away when it speeds up"'],
['What is dispersion? Why does a prism split white light into colours?','Dispersion is the separation of white light into its component colours (the visible spectrum).\n\nWhite light contains all visible wavelengths (colours) mixed together. When it enters a prism:\n• Each colour (wavelength) travels at a slightly different speed in glass\n• Therefore each colour refracts (bends) by a slightly different amount\n• Violet light bends the MOST; red light bends the LEAST\n• The colours separate, spreading into a spectrum: red → orange → yellow → green → blue → indigo → violet'],
['A blue filter is placed over a white light source. A red book is placed in the filtered light. What colour does the book appear? Explain.','The book appears BLACK.\n\nA blue filter only allows blue light to pass through — all other colours are absorbed by the filter.\n\nThe red book reflects red light and absorbs all other colours — including blue.\n\nSince there is only blue light available (no red light), and the book absorbs blue light, NO light is reflected from the book. No light reaching our eyes = the book appears black.'],
['Describe the path of light through the human eye, naming each structure and its function.','1. CORNEA: transparent outer layer — refracts (bends) light; responsible for most of the eye\'s focusing power\n2. PUPIL: opening in the iris — controls how much light enters\n3. IRIS: coloured ring around the pupil — adjusts pupil size\n4. LENS: refracts light to fine-tune the focus; changes shape (accommodation) for near/far objects\n5. RETINA: back wall of the eye — contains photoreceptors (rod cells for low light/movement; cone cells for colour)\n6. OPTIC NERVE: carries electrical signals from the retina to the brain\n7. BRAIN: processes and interprets the signals as a visual image'],
['Explain the difference between a converging and a diverging lens. What is a focal point?','Converging lens (convex): thicker in the middle, thinner at the edges. Bends parallel rays inward to meet at a FOCAL POINT. Uses: cameras, eyes, magnifying glasses.\n\nDiverging lens (concave): thinner in the middle, thicker at the edges. Bends parallel rays outward — they appear to come from a virtual focal point behind the lens. Uses: glasses for short-sightedness (myopia).\n\nThe FOCAL POINT is the point where parallel rays converge after passing through a converging lens (or appear to diverge from with a diverging lens). The FOCAL LENGTH is the distance from the lens to the focal point.']
],
ws:['REFLECTION','REFRACTION','DISPERSION','SPECTRUM','CONVERGING','RETINA','CORNEA','NORMAL','WAVELENGTH','PRISM'],
cue:'Essential cue cards:\n• Law of reflection: angle in = angle out (from normal). Draw a diagram with the normal as a dotted line.\n• Refraction: definition + "bends towards normal when entering denser medium (slows down)". Draw a ray bending in glass.\n• Dispersion: prism splits white light → ROYGBIV; violet bends most, red bends least\n• Colours: white reflects all / black absorbs all / coloured object reflects its own colour, absorbs others\n• Eye structure: draw and label in order — cornea, pupil, lens, retina, optic nerve, brain. Function of each.',
mm:'Central: LIGHT\n\nBranch 1: REFLECTION\n→ Law of reflection (i = r)\n→ Angles measured from normal (not surface)\n\nBranch 2: REFRACTION\n→ Light slows → bends towards normal (denser medium)\n→ Light speeds up → bends away from normal\n→ Angle of incidence vs angle of refraction\n\nBranch 3: DISPERSION\n→ Prism + white light → spectrum (ROYGBIV)\n→ Violet bends most, red least\n→ Why: different wavelengths, different speeds\n\nBranch 4: COLOUR\n→ Primary colours: R, G, B → combine = white\n→ White = reflects all; Black = absorbs all\n→ Coloured object: reflects own colour, absorbs rest\n→ Filters and coloured light\n\nBranch 5: EYE\n→ Path of light through eye (6 structures)\n→ Converging vs diverging lens',
tips:['Always draw the NORMAL as a dotted line perpendicular to the surface in reflection/refraction diagrams. Examiners need it — it shows you know angles are measured from it.','Light bends TOWARDS the normal entering glass (slows down). AWAY from the normal leaving glass (speeds up). Sketch it once and it sticks.','Colour questions: a coloured FILTER only lets through its OWN colour. A coloured OBJECT reflects its own colour, absorbs others. These work differently.','Know the path of light through the eye in order — cornea, pupil, lens, retina, optic nerve, brain. Fill-in-diagram questions are frequent.']}
]};

let ST={screen:'home',chId:null,tab:'study',matchSel:null,matchPairs:[],matchDone:false,tfState:{},wsData:null,wsStart:null,wsFound:new Set(),wsFoundCells:new Set(),qaOpen:new Set(),prog:{}};

function lp(){try{const p=localStorage.getItem('yr8sci');if(p)ST.prog=JSON.parse(p);}catch(e){}}
function sp(){try{localStorage.setItem('yr8sci',JSON.stringify(ST.prog));}catch(e){}}
lp();

function mark(chId,act){if(!ST.prog[chId])ST.prog[chId]={};ST.prog[chId][act]=true;sp();}
function isDone(chId,act){return!!(ST.prog[chId]&&ST.prog[chId][act]);}
function chPct(chId){const acts=['match','tf','ws','qa'];return Math.round(acts.filter(a=>isDone(chId,a)).length/acts.length*100);}
function totalPct(){const chs=DATA.chapters;const total=chs.length*4;const done=chs.reduce((s,c)=>s+[['match'],['tf'],['ws'],['qa']].filter(([a])=>isDone(c.id,a)).length,0);return Math.round(done/total*100);}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function generateWS(words,size=13){
  const g=Array.from({length:size},()=>Array(size).fill(''));
  const placed=[];
  const dirs=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  for(const word of words){
    const w=word.toUpperCase().replace(/\s+/g,'');
    let done=false;
    for(let att=0;att<300&&!done;att++){
      const d=dirs[Math.floor(Math.random()*dirs.length)];
      let minR=0,maxR=size-1,minC=0,maxC=size-1;
      if(d[0]>0)maxR=size-w.length;
      if(d[0]<0){minR=w.length-1;}
      if(d[1]>0)maxC=size-w.length;
      if(d[1]<0){minC=w.length-1;}
      if(maxR<minR||maxC<minC)continue;
      const r=minR+Math.floor(Math.random()*(maxR-minR+1));
      const c=minC+Math.floor(Math.random()*(maxC-minC+1));
      let fits=true;
      for(let i=0;i<w.length;i++){
        const nr=r+d[0]*i,nc=c+d[1]*i;
        if(nr<0||nr>=size||nc<0||nc>=size){fits=false;break;}
        if(g[nr][nc]!==''&&g[nr][nc]!==w[i]){fits=false;break;}
      }
      if(fits){
        const cells=[];
        for(let i=0;i<w.length;i++){const nr=r+d[0]*i,nc=c+d[1]*i;g[nr][nc]=w[i];cells.push([nr,nc]);}
        placed.push({word:w,cells});done=true;
      }
    }
  }
  const L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(!g[r][c])g[r][c]=L[Math.floor(Math.random()*26)];
  return{grid:g,placed};
}

function getSubjColor(subj){return subj==='bio'?'var(--bio)':subj==='chem'?'var(--chem)':'var(--phys)';}
function getSubjName(subj){return subj==='bio'?'Biology':subj==='chem'?'Chemistry':'Physics';}
function getChById(id){return DATA.chapters.find(c=>c.id===id);}

function render(){
  if(ST.screen==='home')document.getElementById('app').innerHTML=renderHome();
  else if(ST.screen==='chapter')document.getElementById('app').innerHTML=renderChapter();

}

function renderMatch(ch){
  const col=getSubjColor(ch.subj);
  if(ST.matchDone&&isDone(ST.chId,'match')){
    return`<div class="match-complete"><span class="mc-emoji">🎉</span><p style="font-size:15px;font-weight:600;margin-bottom:6px">All matched — nice work.</p><p style="font-size:13px;color:var(--mu)">This activity is marked complete.</p><button class="btn-p" id="match-again">Try again</button></div>`;
  }
  const pairs=ST.matchPairs.length?ST.matchPairs:(()=>{
    const p=ch.matching.map((m,i)=>({id:i,term:m[0],match:m[1]}));
    ST.matchPairs=p;ST.matchLeft=shuffle(p.map(x=>({...x,side:'left'})));ST.matchRight=shuffle(p.map(x=>({...x,side:'right'})));
    return p;
  })();
  const matched=new Set(Object.entries(ST.prog[ST.chId]||{}).filter(([k,v])=>k.startsWith('mp')&&v).map(([k])=>parseInt(k.slice(2))));
  if(!ST.matchLeft)ST.matchLeft=shuffle(pairs.map(x=>({...x,side:'left'})));
  if(!ST.matchRight)ST.matchRight=shuffle(pairs.map(x=>({...x,side:'right'})));
  const total=pairs.length;const done=matched.size;
  let html=`<div class="score-row"><span class="score-lbl">Pairs matched</span><span class="score-val" style="color:${col}">${done} / ${total}</span></div>
<p style="font-size:13px;color:var(--mu);margin-bottom:12px">Click a term on the left, then click its match on the right.</p>
<div class="match-grid"><div class="match-col">`;
  ST.matchLeft.forEach(item=>{
    const isMatched=matched.has(item.id);
    const isSel=ST.matchSel&&ST.matchSel.id===item.id&&ST.matchSel.side==='left';
    html+=`<div class="mi${isMatched?' matched':''}${isSel?' selected':''}" data-mid="${item.id}" data-side="left" data-wrong="${ST.matchWrong===item.id+'-left'?'1':'0'}">${item.term}</div>`;
  });
  html+=`</div><div class="match-col">`;
  ST.matchRight.forEach(item=>{
    const isMatched=matched.has(item.id);
    const isSel=ST.matchSel&&ST.matchSel.id===item.id&&ST.matchSel.side==='right';
    html+=`<div class="mi${isMatched?' matched':''}${isSel?' selected':''}" data-mid="${item.id}" data-side="right">${item.match}</div>`;
  });
  html+=`</div></div>`;
  if(done===total){
    mark(ST.chId,'match');ST.matchDone=true;
    html+=`<div class="act-done"><span style="font-size:28px">🎉</span><p style="margin-top:8px;font-weight:600">All matched! Activity complete.</p></div>`;
  }
  html+=`<button class="btn-g" id="match-reset" style="margin-top:12px;width:100%">Reset</button>`;
  return html;
}

function renderTF(ch){
  const col=getSubjColor(ch.subj);
  const answers=ST.tfState||{};
  const total=ch.tf.length;const done=Object.keys(answers).length;
  if(done===total&&!isDone(ST.chId,'tf')){mark(ST.chId,'tf');}
  let html=`<div class="score-row"><span class="score-lbl">Answered</span><span class="score-val" style="color:${col}">${done} / ${total}</span></div>
<p style="font-size:13px;color:var(--mu);margin-bottom:14px">Read the statement. Decide if it's true or false, then click to find out.</p>
<div class="tf-list">`;
  ch.tf.forEach((item,i)=>{
    const ans=answers[i];
    html+=`<div class="tf-card">
<div class="tf-stmt">${item[0]}</div>

function renderWS(ch){
  const col=getSubjColor(ch.subj);
  if(!ST.wsData||ST.wsChId!==ST.chId){
    ST.wsData=generateWS(ch.ws);ST.wsChId=ST.chId;ST.wsStart=null;ST.wsFound=new Set();ST.wsFoundCells=new Set();
  }
  const {grid,placed}=ST.wsData;
  const size=grid.length;
  const total=placed.length;const found=ST.wsFound.size;
  if(found===total&&total>0&&!isDone(ST.chId,'ws')){mark(ST.chId,'ws');}
  let html=`<div class="score-row"><span class="score-lbl">Words found</span><span class="score-val" style="color:${col}">${found} / ${total}</span></div>
<p class="ws-hint">Click the first letter of a word, then click the last letter. Works horizontally, vertically, and diagonally.</p>
<div class="ws-container"><div class="ws-grid">`;
  for(let r=0;r<size;r++){
    html+=`<div class="ws-row">`;
    for(let c=0;c<size;c++){
      const key=`${r},${c}`;
      const isFound=ST.wsFoundCells.has(key);
      const isStart=ST.wsStart&&ST.wsStart[0]===r&&ST.wsStart[1]===c;
      html+=`<div class="ws-cell${isFound?' found':''}${isStart&&!isFound?' start':''}" data-wr="${r}" data-wc="${c}">${grid[r][c]}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div></div><div class="ws-words">`;
  ch.ws.forEach(w=>{
    const wup=w.toUpperCase();
    const isFound=placed.some(p=>p.word===wup)&&ST.wsFound.has(wup);
    html+=`<span class="ws-word${isFound?' found':''}">${w}</span>`;
  });
  html+=`</div>`;
  if(found===total&&total>0){
    html+=`<div class="act-done" style="margin-top:12px"><span style="font-size:28px">🔍</span><p style="font-weight:600;margin-top:8px">All ${total} words found! Activity complete.</p></div>`;
  }
  html+=`<button class="btn-g" id="ws-reset" style="margin-top:12px;width:100%">New puzzle</button>`;
  return html;
}

function renderQA(ch){
  const col=getSubjColor(ch.subj);
  const shown=ST.qaOpen;

  let html=`<p style="font-size:13px;color:var(--mu);margin-bottom:6px;line-height:1.6">Write your answer first — in your notebook or on paper. Then reveal to check.<br>These are the types of question you will face in the exam.</p>

  }
  html+=`<button class="btn-g" id="qa-reset" style="margin-top:12px;width:100%">Hide all answers</button>`;
  return html;

function wsClick(r,c){
  if(!ST.wsStart){ST.wsStart=[r,c];render();return;}
  const[sr,sc]=ST.wsStart;const[er,ec]=[r,c];
  if(sr===r&&sc===c){ST.wsStart=null;render();return;}
  const dr=er-sr,dc=ec-sc;
  if(dr!==0&&dc!==0&&Math.abs(dr)!==Math.abs(dc)){ST.wsStart=[r,c];render();return;}
  const steps=Math.max(Math.abs(dr),Math.abs(dc));
  const stepR=steps?dr/steps:0,stepC=steps?dc/steps:0;
  const path=[];
  for(let i=0;i<=steps;i++)path.push([sr+i*stepR,sc+i*stepC]);
  const word=path.map(([pr,pc])=>ST.wsData.grid[pr][pc]).join('');
  const wordRev=word.split('').reverse().join('');
  let matched=null;
  for(const p of ST.wsData.placed){
    if(!ST.wsFound.has(p.word)&&(word===p.word||wordRev===p.word)){matched=p.word;break;}
  }
  if(matched){
    ST.wsFound.add(matched);
    for(const[pr,pc]of path)ST.wsFoundCells.add(`${pr},${pc}`);
    if(ST.wsFound.size===ST.wsData.placed.length&&!isDone(ST.chId,'ws')){mark(ST.chId,'ws');}
  }
  ST.wsStart=null;render();
}

function bind(){
  document.querySelectorAll('[data-ch]').forEach(el=>{
    el.addEventListener('click',()=>{
      ST.screen='chapter';ST.chId=el.dataset.ch;ST.tab='study';
      ST.matchPairs=[];ST.matchLeft=null;ST.matchRight=null;ST.matchSel=null;ST.matchDone=false;
      ST.tfState={};ST.wsData=null;ST.wsStart=null;ST.wsFound=new Set();ST.wsFoundCells=new Set();ST.qaOpen=new Set();
      render();
    });
  });
  const bh=document.getElementById('back-home');
  if(bh)bh.addEventListener('click',()=>{ST.screen='home';render();});
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{ST.tab=el.dataset.tab;render();});
  });
  document.querySelectorAll('[data-fact]').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=parseInt(el.dataset.fact);
      const k='f'+i;ST.qaOpen.has(k)?ST.qaOpen.delete(k):ST.qaOpen.add(k);render();
    });
  });
  // Matching
  document.querySelectorAll('.mi:not(.matched)').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.mid);const side=el.dataset.side;
      if(!ST.matchSel){ST.matchSel={id,side};render();return;}
      if(ST.matchSel.side===side){ST.matchSel={id,side};render();return;}
      const leftId=side==='right'?ST.matchSel.id:id;
      const rightId=side==='right'?id:ST.matchSel.id;
      if(leftId===rightId){
        if(!ST.prog[ST.chId])ST.prog[ST.chId]={};
        ST.prog[ST.chId]['mp'+leftId]=true;sp();
        ST.matchSel=null;render();
      } else {
        ST.matchSel=null;
        el.classList.add('wrong');
        setTimeout(()=>{el.classList.remove('wrong');render();},500);
      }
    });
  });
  const mr=document.getElementById('match-reset');
  if(mr)mr.addEventListener('click',()=>{
    if(!ST.prog[ST.chId])ST.prog[ST.chId]={};
    const keys=Object.keys(ST.prog[ST.chId]).filter(k=>k.startsWith('mp'));
    keys.forEach(k=>delete ST.prog[ST.chId][k]);
    sp();ST.matchPairs=[];ST.matchLeft=null;ST.matchRight=null;ST.matchSel=null;ST.matchDone=false;render();
  });
  const ma=document.getElementById('match-again');
  if(ma)ma.addEventListener('click',()=>{
    if(!ST.prog[ST.chId])ST.prog[ST.chId]={};
    const keys=Object.keys(ST.prog[ST.chId]).filter(k=>k.startsWith('mp'));
    keys.forEach(k=>delete ST.prog[ST.chId][k]);
    sp();ST.matchPairs=[];ST.matchLeft=null;ST.matchRight=null;ST.matchSel=null;ST.matchDone=false;render();
  });
  // TF
  document.querySelectorAll('.tf-btn').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=parseInt(el.dataset.tfi);const chose=el.dataset.ans;
      ST.tfState[i]={chose};render();
    });
  });
  const tfr=document.getElementById('tf-reset');
  if(tfr)tfr.addEventListener('click',()=>{ST.tfState={};render();});
  // WS
  document.querySelectorAll('.ws-cell').forEach(el=>{
    el.addEventListener('click',()=>wsClick(parseInt(el.dataset.wr),parseInt(el.dataset.wc)));
  });
  const wsr=document.getElementById('ws-reset');
  if(wsr)wsr.addEventListener('click',()=>{ST.wsData=null;ST.wsStart=null;ST.wsFound=new Set();ST.wsFoundCells=new Set();render();});
  // QA
  document.querySelectorAll('[data-qi]').forEach(el=>{
    el.addEventListener('click',()=>{ST.qaOpen.add('q'+parseInt(el.dataset.qi));render();});
  });
  const qar=document.getElementById('qa-reset');
  if(qar)qar.addEventListener('click',()=>{ST.qaOpen=new Set();render();});
}

render();
